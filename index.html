<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention Type — 0/1 Variable</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #111111;
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
    }
    #ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 20px 20px;
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.97));
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px 24px;
      z-index: 10;
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
    }
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .preset-btn {
      margin: 0;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 12px;
      border: 1px solid #111;
      background: #fff;
      color: #111;
      cursor: pointer;
    }
    .preset-btn:hover {
      background: #f4f4f4;
    }
    .preset-btn:focus-visible {
      outline: 2px solid #111;
      outline-offset: 2px;
    }
    .preset-btn.is-active {
      background: #111;
      color: #fff;
    }
    .ui-center {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      margin-left: auto;
    }
    #ui label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; color: #111; }
    #ui input[type="text"] {
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid #111;
      background: #fff;
      color: #111;
      font-family: inherit;
      font-size: 13px;
    }
    #ui input[type="range"] { width: min(360px, 50vw); accent-color: #111; font-family: inherit; }
    #sketch-host {
      display: block;
      width: 100%;
    }
    main { display: block; width: 100%; }
    canvas { display: block; }
    #sketch-host canvas:focus-visible {
      outline: 2px solid #111;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main id="sketch-host"></main>
  <div id="ui">
    <div class="preset-row" role="group" aria-label="Attention presets">
      <button type="button" class="preset-btn" id="preset-absent" data-band="absent" data-attention="12">Absent</button>
      <button type="button" class="preset-btn" id="preset-distracted" data-band="distracted" data-attention="48">Distracted</button>
      <button type="button" class="preset-btn" id="preset-present" data-band="present" data-attention="100">Present</button>
    </div>
    <div class="ui-center">
      <div>
        <label for="attention">Attention axis</label><br />
        <input type="range" id="attention" min="0" max="100" value="100" />
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
