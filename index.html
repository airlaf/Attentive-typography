<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention Type — 0/1 Variable</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #111111;
      font-family: "Geist Mono", "SF Mono", Consolas, monospace;
    }
    #ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 20px 20px;
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.97));
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      z-index: 10;
    }
    #ui label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; color: #111; }
    #ui input[type="text"] {
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid #111;
      background: #fff;
      color: #111;
      font-family: inherit;
      font-size: 13px;
    }
    #ui input[type="range"] { width: min(360px, 50vw); accent-color: #111; }
    #state {
      font-size: 12px;
      letter-spacing: 0.08em;
      min-width: 140px;
      color: #111;
    }
    #state .name { font-weight: 600; color: #000; }
    #state .val { opacity: 0.65; font-variant-numeric: tabular-nums; color: #111; }
    #sketch-host {
      display: block;
      width: 100%;
    }
    main { display: block; width: 100%; }
    canvas { display: block; }
    #sketch-host canvas:focus-visible {
      outline: 2px solid #111;
      outline-offset: 3px;
    }
    .type-hint {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      color: #111;
      max-width: min(280px, 40vw);
      line-height: 1.35;
    }
  </style>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/400.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/500.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/600.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/700.css" />
</head>
<body>
  <main id="sketch-host"></main>
  <div id="ui">
    <p class="type-hint">Opens with a prompt — click it to clear and type. Blinking bar shows where text goes (max 120 characters).</p>
    <div>
      <label for="attention">Attention axis</label><br />
      <input type="range" id="attention" min="0" max="100" value="100" />
    </div>
    <div id="state"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
